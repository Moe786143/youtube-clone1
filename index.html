<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FakeTube - Home</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar-left">
      <button class="icon-btn" id="menuBtn">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a href="#" class="logo">
        <i class="fa-brands fa-youtube"></i>
        <span>FakeTube</span>
      </a>
    </div>

    <div class="navbar-center">
      <form class="search-form" id="searchForm">
        <input type="text" id="searchInput" placeholder="Search" />
        <button type="submit" class="search-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
      <button class="icon-btn mic-btn">
        <i class="fa-solid fa-microphone"></i>
      </button>
    </div>

    <div class="navbar-right">
      <button class="icon-btn" id="darkModeBtn" title="Toggle dark mode">
        <i class="fa-regular fa-moon"></i>
      </button>
      <button class="icon-btn">
        <i class="fa-solid fa-video"></i>
      </button>
      <button class="icon-btn">
        <i class="fa-solid fa-bell"></i>
      </button>
      <div class="avatar">S</div>
    </div>
  </header>

  <!-- CATEGORY CHIPS -->
  <div class="category-bar" id="categoryBar">
    <button class="chip active" data-category="all">All</button>
    <button class="chip" data-category="music">Music</button>
    <button class="chip" data-category="gaming">Gaming</button>
    <button class="chip" data-category="news">News</button>
    <button class="chip" data-category="coding">Coding</button>
    <button class="chip" data-category="sports">Sports</button>
    <button class="chip" data-category="cooking">Cooking</button>
    <button class="chip" data-category="travel">Travel</button>
    <button class="chip" data-category="fashion">Fashion</button>
    <button class="chip" data-category="science">Science</button>
  </div>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-item active" data-view="home" id="homeBtn">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-fire"></i>
          <span>Shorts</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-play"></i>
          <span>Subscriptions</span>
        </a>
        <div class="sidebar-divider"></div>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-user"></i>
          <span>You</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <span>History</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-list"></i>
          <span>Playlists</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-video"></i>
          <span>Your videos</span>
        </a>
        <a href="#" class="sidebar-item" data-view="watch-later" id="watchLaterBtn">
          <i class="fa-regular fa-clock"></i>
          <span>Watch Later <span class="sidebar-count" id="watchLaterCount">(0)</span></span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-regular fa-thumbs-up"></i>
          <span>Liked videos</span>
        </a>
        <div class="sidebar-divider"></div>
        <p class="sidebar-section-title">Subscriptions</p>
        <a href="#" class="sidebar-item">
          <img src="https://i.pravatar.cc/24?img=1" class="sub-avatar" alt="" />
          <span>Traversy Media</span>
        </a>
        <a href="#" class="sidebar-item">
          <img src="https://i.pravatar.cc/24?img=2" class="sub-avatar" alt="" />
          <span>Fireship</span>
        </a>
        <a href="#" class="sidebar-item">
          <img src="https://i.pravatar.cc/24?img=3" class="sub-avatar" alt="" />
          <span>Kevin Powell</span>
        </a>
        <a href="#" class="sidebar-item">
          <img src="https://i.pravatar.cc/24?img=4" class="sub-avatar" alt="" />
          <span>Theo - t3.gg</span>
        </a>
        <div class="sidebar-divider"></div>
        <p class="sidebar-section-title">Explore</p>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-fire-flame-curved"></i>
          <span>Trending</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-music"></i>
          <span>Music</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-gamepad"></i>
          <span>Gaming</span>
        </a>
        <a href="#" class="sidebar-item">
          <i class="fa-solid fa-newspaper"></i>
          <span>News</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
      <div class="video-grid" id="videoGrid"></div>
      <div class="no-results" id="noResults" hidden>
        <i class="fa-solid fa-magnifying-glass"></i>
        <p>No videos found</p>
      </div>
    </main>

  </div>

  <!-- VIDEO PLAYER MODAL -->
  <div class="modal-overlay" id="videoModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <button class="modal-close" id="closeModal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="video-player">
          <iframe id="videoIframe" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="modal-info">
          <div class="modal-main">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-meta">
              <img id="modalAvatar" src="" alt="" class="modal-avatar" />
              <div>
                <p class="modal-channel" id="modalChannel"></p>
                <p class="modal-views" id="modalViews"></p>
              </div>
            </div>
            <div class="modal-actions">
              <button class="action-btn like-btn" id="likeBtn">
                <i class="fa-regular fa-thumbs-up"></i>
                <span id="likeCount">0</span>
              </button>
              <button class="action-btn">
                <i class="fa-regular fa-thumbs-down"></i>
                Dislike
              </button>
              <button class="action-btn">
                <i class="fa-solid fa-share"></i>
                Share
              </button>
              <button class="action-btn">
                <i class="fa-solid fa-download"></i>
                Save
              </button>
            </div>
          </div>
          <div class="related-videos">
            <h3>Related Videos</h3>
            <div id="relatedGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
